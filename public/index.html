<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TikTok Live Reader</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<style>
  :root {
    --bg:       #0a0a0f;
    --surface:  #12121a;
    --border:   #1e1e2e;
    --accent:   #fe2c55;
    --accent2:  #69c9d0;
    --text:     #e8e8f0;
    --muted:    #55556a;
    --glow:     0 0 18px rgba(254,44,85,.45);
    --glow2:    0 0 14px rgba(105,201,208,.35);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* ── Noise grain overlay ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: .5;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1.5rem 2rem;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,15,.85);
    backdrop-filter: blur(10px);
    position: sticky; top: 0; z-index: 100;
  }

  .logo {
    font-size: 1.5rem;
    font-weight: 800;
    letter-spacing: -.02em;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    white-space: nowrap;
  }

  .logo span { font-family: 'Space Mono', monospace; font-size: .85em; }

  /* ── Main layout ── */
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 0;
    height: calc(100vh - 65px);
  }

  /* ── Sidebar ── */
  aside {
    border-right: 1px solid var(--border);
    padding: 1.75rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
    background: var(--surface);
    overflow-y: auto;
  }

  .section-label {
    font-family: 'Space Mono', monospace;
    font-size: .65rem;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: .5rem;
  }

  /* Input group */
  .input-group {
    display: flex;
    flex-direction: column;
    gap: .75rem;
  }

  .field {
    display: flex;
    align-items: center;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    transition: border-color .2s;
  }
  .field:focus-within {
    border-color: var(--accent);
    box-shadow: var(--glow);
  }

  .field .at {
    padding: 0 .75rem;
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    font-size: .9rem;
    user-select: none;
    border-right: 1px solid var(--border);
  }

  .field input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    padding: .75rem;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: .95rem;
  }
  .field input::placeholder { color: var(--muted); }

  /* Buttons */
  .btn {
    width: 100%;
    padding: .8rem 1.25rem;
    border-radius: 8px;
    border: none;
    font-family: 'Syne', sans-serif;
    font-size: .9rem;
    font-weight: 700;
    cursor: pointer;
    transition: all .2s;
    letter-spacing: .02em;
  }

  .btn-connect {
    background: var(--accent);
    color: #fff;
    box-shadow: var(--glow);
  }
  .btn-connect:hover { filter: brightness(1.15); transform: translateY(-1px); }
  .btn-connect:active { transform: translateY(0); }
  .btn-connect:disabled { opacity: .45; cursor: not-allowed; transform: none; }

  .btn-disconnect {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-disconnect:hover { color: var(--accent); border-color: var(--accent); }
  .btn-disconnect:disabled { opacity: .3; cursor: not-allowed; }

  /* Status badge */
  .status-badge {
    display: flex;
    align-items: center;
    gap: .6rem;
    padding: .7rem 1rem;
    border-radius: 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    font-size: .82rem;
    color: var(--muted);
    min-height: 44px;
    transition: all .3s;
  }
  .status-badge.connected  { color: var(--accent2); border-color: rgba(105,201,208,.3); }
  .status-badge.error      { color: var(--accent);  border-color: rgba(254,44,85,.3); }
  .status-badge.reconnecting { color: #f5a623; border-color: rgba(245,166,35,.3); }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
  }
  .connected  .dot { background: var(--accent2); box-shadow: var(--glow2); animation: pulse 2s infinite; }
  .error      .dot { background: var(--accent); }
  .reconnecting .dot { background: #f5a623; animation: pulse 1s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .3; }
  }

  /* Stats */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: .75rem;
  }

  .stat-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: .9rem;
    display: flex;
    flex-direction: column;
    gap: .25rem;
  }

  .stat-value {
    font-family: 'Space Mono', monospace;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--text);
  }

  .stat-label {
    font-size: .7rem;
    color: var(--muted);
    letter-spacing: .04em;
    text-transform: uppercase;
  }

  /* Volume */
  .volume-row {
    display: flex;
    align-items: center;
    gap: .75rem;
  }

  .volume-row label {
    font-size: .8rem;
    color: var(--muted);
    white-space: nowrap;
    font-family: 'Space Mono', monospace;
    width: 55px;
  }

  input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    background: transparent;
    height: 4px;
  }
  input[type=range]::-webkit-slider-runnable-track {
    background: var(--border);
    height: 4px;
    border-radius: 2px;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    margin-top: -5px;
    cursor: pointer;
    box-shadow: var(--glow);
  }

  /* ── Comment feed ── */
  .feed-area {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  .feed-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.25rem 1.75rem;
    border-bottom: 1px solid var(--border);
  }

  .feed-title {
    font-size: 1rem;
    font-weight: 700;
  }

  .btn-clear {
    font-family: 'Space Mono', monospace;
    font-size: .7rem;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: .35rem .75rem;
    border-radius: 6px;
    cursor: pointer;
    transition: all .2s;
    letter-spacing: .05em;
  }
  .btn-clear:hover { color: var(--accent); border-color: var(--accent); }

  #comments-container {
    flex: 1;
    overflow-y: auto;
    padding: 1rem 1.75rem;
    display: flex;
    flex-direction: column;
    gap: .6rem;
    scroll-behavior: smooth;
  }

  #comments-container::-webkit-scrollbar { width: 4px; }
  #comments-container::-webkit-scrollbar-track { background: transparent; }
  #comments-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Empty state */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    color: var(--muted);
    padding: 2rem;
    text-align: center;
  }

  .empty-icon {
    font-size: 3rem;
    opacity: .3;
  }

  .empty-state p { font-size: .9rem; line-height: 1.6; }

  /* Comment card */
  .comment-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: .85rem 1rem;
    display: flex;
    gap: .85rem;
    animation: slideIn .25s cubic-bezier(.22,1,.36,1);
    transition: border-color .2s;
  }
  .comment-card:hover { border-color: rgba(254,44,85,.25); }
  .comment-card.playing { border-color: var(--accent2); box-shadow: var(--glow2); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: .8rem;
    font-weight: 800;
    flex-shrink: 0;
    color: #fff;
  }

  .comment-body { flex: 1; min-width: 0; }

  .comment-meta {
    display: flex;
    align-items: baseline;
    gap: .5rem;
    margin-bottom: .3rem;
  }

  .comment-user {
    font-weight: 700;
    font-size: .82rem;
    color: var(--accent);
  }

  .comment-time {
    font-family: 'Space Mono', monospace;
    font-size: .65rem;
    color: var(--muted);
  }

  .comment-text {
    font-size: .88rem;
    line-height: 1.5;
    color: var(--text);
    word-break: break-word;
  }

  .audio-indicator {
    display: flex;
    align-items: center;
    gap: 3px;
    margin-top: .4rem;
  }

  .audio-indicator span {
    display: block;
    width: 3px;
    background: var(--accent2);
    border-radius: 3px;
    animation: eq .8s ease infinite;
  }
  .audio-indicator span:nth-child(1) { height: 8px;  animation-delay: 0s; }
  .audio-indicator span:nth-child(2) { height: 14px; animation-delay: .15s; }
  .audio-indicator span:nth-child(3) { height: 6px;  animation-delay: .3s; }
  .audio-indicator span:nth-child(4) { height: 12px; animation-delay: .1s; }

  @keyframes eq {
    0%, 100% { transform: scaleY(1); }
    50%       { transform: scaleY(.3); }
  }

  /* ── Responsive ── */
  @media (max-width: 720px) {
    main { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
    aside { border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>
<body>

<header>
  <div class="logo">TT<span>LIVE</span></div>
  <span style="color:var(--muted);font-size:.8rem;font-family:'Space Mono',monospace;">comentarios en tiempo real</span>
</header>

<main>
  <!-- Sidebar -->
  <aside>
    <div>
      <p class="section-label">Conectar</p>
      <div class="input-group">
        <div class="field">
          <span class="at">@</span>
          <input id="username-input" type="text" placeholder="usuario_tiktok" autocomplete="off" />
        </div>
        <button class="btn btn-connect" id="btn-connect">Conectar al Live</button>
        <button class="btn btn-disconnect" id="btn-disconnect" disabled>Desconectar</button>
      </div>
    </div>

    <div>
      <p class="section-label">Estado</p>
      <div class="status-badge" id="status-badge">
        <span class="dot"></span>
        <span id="status-text">Sin conexión</span>
      </div>
    </div>

    <div>
      <p class="section-label">Estadísticas</p>
      <div class="stats-grid">
        <div class="stat-card">
          <span class="stat-value" id="stat-total">0</span>
          <span class="stat-label">Comentarios</span>
        </div>
        <div class="stat-card">
          <span class="stat-value" id="stat-queue">0</span>
          <span class="stat-label">En cola</span>
        </div>
      </div>
    </div>

    <div>
      <p class="section-label">Audio</p>
      <div class="input-group">
        <div class="volume-row">
          <label>Volumen</label>
          <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="1" />
        </div>
        <label style="display:flex;align-items:center;gap:.6rem;cursor:pointer;font-size:.82rem;color:var(--muted);">
          <input type="checkbox" id="audio-toggle" checked
            style="accent-color:var(--accent);width:14px;height:14px;" />
          Reproducir audio TTS
        </label>
        <label style="display:flex;align-items:center;gap:.6rem;cursor:pointer;font-size:.82rem;color:var(--muted);">
          <input type="checkbox" id="scroll-toggle" checked
            style="accent-color:var(--accent);width:14px;height:14px;" />
          Auto-scroll
        </label>
      </div>
    </div>
  </aside>

  <!-- Feed -->
  <section class="feed-area">
    <div class="feed-header">
      <span class="feed-title">Feed de comentarios</span>
      <button class="btn-clear" id="btn-clear">LIMPIAR</button>
    </div>
    <div id="comments-container">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">💬</div>
        <p>Conecta a un Live de TikTok<br />y los comentarios aparecerán aquí en tiempo real.</p>
      </div>
    </div>
  </section>
</main>

<script>
  const socket = io();
  let totalComments = 0;
  let currentAudio = null;
  const audioQueue = [];
  let isPlayingAudio = false;

  // ── Elementos ──
  const usernameInput = document.getElementById('username-input');
  const btnConnect    = document.getElementById('btn-connect');
  const btnDisconnect = document.getElementById('btn-disconnect');
  const statusBadge   = document.getElementById('status-badge');
  const statusText    = document.getElementById('status-text');
  const container     = document.getElementById('comments-container');
  const emptyState    = document.getElementById('empty-state');
  const statTotal     = document.getElementById('stat-total');
  const statQueue     = document.getElementById('stat-queue');
  const volumeSlider  = document.getElementById('volume-slider');
  const audioToggle   = document.getElementById('audio-toggle');
  const scrollToggle  = document.getElementById('scroll-toggle');
  const btnClear      = document.getElementById('btn-clear');

  // ── Conectar ──
  btnConnect.addEventListener('click', () => {
    const username = usernameInput.value.trim().replace(/^@/, '');
    if (!username) { setStatus('error', '❌ Ingresa un username'); return; }
    socket.emit('join-live', username);
    setStatus('reconnecting', `Conectando a @${username}...`);
    btnConnect.disabled = true;
    btnDisconnect.disabled = false;
  });

  btnDisconnect.addEventListener('click', () => {
    socket.emit('leave-live');
    setStatus('', 'Sin conexión');
    btnConnect.disabled = false;
    btnDisconnect.disabled = true;
  });

  usernameInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') btnConnect.click();
  });

  // ── Status ──
  socket.on('status', ({ type, message }) => {
    setStatus(type, message);
    if (type === 'connected') {
      btnConnect.disabled = true;
      btnDisconnect.disabled = false;
    }
    if (type === 'error' || type === 'failed') {
      btnConnect.disabled = false;
    }
  });

  function setStatus(type, message) {
    statusBadge.className = 'status-badge ' + (type || '');
    statusText.textContent = message;
  }

  // ── Nuevo comentario ──
  socket.on('nuevo-comentario-voz', ({ usuario, mensaje, audio }) => {
    totalComments++;
    statTotal.textContent = totalComments;

    // Ocultar empty state
    if (emptyState) emptyState.style.display = 'none';

    // Crear card
    const card = document.createElement('div');
    card.className = 'comment-card';
    const initials = usuario.slice(0, 2).toUpperCase();
    const time = new Date().toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

    card.innerHTML = `
      <div class="avatar">${initials}</div>
      <div class="comment-body">
        <div class="comment-meta">
          <span class="comment-user">@${escapeHtml(usuario)}</span>
          <span class="comment-time">${time}</span>
        </div>
        <p class="comment-text">${escapeHtml(mensaje)}</p>
      </div>
    `;
    container.appendChild(card);

    // Auto-scroll
    if (scrollToggle.checked) {
      container.scrollTop = container.scrollHeight;
    }

    // Audio
    if (audio && audioToggle.checked) {
      audioQueue.push({ card, audio });
      statQueue.textContent = audioQueue.length;
      playNextAudio();
    }
  });

  function playNextAudio() {
    if (isPlayingAudio || audioQueue.length === 0) return;
    isPlayingAudio = true;
    const { card, audio } = audioQueue.shift();
    statQueue.textContent = audioQueue.length;

    // Indicador visual
    const indicator = document.createElement('div');
    indicator.className = 'audio-indicator';
    indicator.innerHTML = '<span></span><span></span><span></span><span></span>';
    card.querySelector('.comment-body').appendChild(indicator);
    card.classList.add('playing');

    const blob = base64ToBlob(audio, 'audio/mp3');
    const url  = URL.createObjectURL(blob);
    currentAudio = new Audio(url);
    currentAudio.volume = parseFloat(volumeSlider.value);

    currentAudio.play().catch(() => {});

    currentAudio.onended = () => {
      card.classList.remove('playing');
      indicator.remove();
      URL.revokeObjectURL(url);
      isPlayingAudio = false;
      playNextAudio();
    };

    currentAudio.onerror = () => {
      card.classList.remove('playing');
      indicator.remove();
      URL.revokeObjectURL(url);
      isPlayingAudio = false;
      playNextAudio();
    };
  }

  // Cambio de volumen en tiempo real
  volumeSlider.addEventListener('input', () => {
    if (currentAudio) currentAudio.volume = parseFloat(volumeSlider.value);
  });

  // Limpiar feed
  btnClear.addEventListener('click', () => {
    container.innerHTML = '';
    totalComments = 0;
    statTotal.textContent = 0;
    audioQueue.length = 0;
    statQueue.textContent = 0;
    if (currentAudio) { currentAudio.pause(); currentAudio = null; isPlayingAudio = false; }
  });

  // ── Utils ──
  function base64ToBlob(base64, mime) {
    const binary = atob(base64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    return new Blob([bytes], { type: mime });
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
